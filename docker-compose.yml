services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3
    container_name: do_an_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - indices.query.bool.max_clause_count=4096
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: do_an_web
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./models:/app/models
      - bge_m3_cache:/root/.cache
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX=topcv_jobs_production
      - AUTO_IMPORT_ON_START=0
      - ENABLE_SKILL_GRAPH=1
      - PYTHONIOENCODING=utf-8
    env_file:
      - ./src/.env
    command: python src/app.py
    stdin_open: true
    tty: true
    init: true

  ollama:
    image: ollama/ollama:latest
    container_name: do_an_ollama
    profiles:
      - crawl
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: do_an_scheduler
    profiles:
      - crawl
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX=topcv_jobs_production
      - CRAWL_SOURCE=general
      - CRAWL_RECHECK_DAYS=7
      - OLLAMA_URL=http://ollama:11434/api/generate
      - PYTHONIOENCODING=utf-8
    env_file:
      - ./src/.env
    command: python src/scheduler.py --once --source general --pages 3 --threads 3

volumes:
  bge_m3_cache:
    driver: local
  es_data:
    driver: local
  ollama_data:
    driver: local
